const LOCI_COLORS = [
  {
    alleles: ['Ay','at'],
    sortOrder: a => a==='Ay' ? 0 : 1,
    pheno(g) {
      if(g==='AyAy') return { bg:'#C49A6C', fg:'#3B1F08', border:'' };
      if(g==='Ayat') return { bg:'#9C7040', fg:'#FAF0E6', border:'' };
      return { bg:'#1C1917', fg:'#D6CFC6', border:'' };
    },
  },
  {
    alleles: ['kbr','ky'],
    sortOrder: a => a==='kbr' ? 0 : 1,
    pheno(g) {
      if(g==='kbrkbr') return { bg:'#4A2F12', fg:'#F5D9A8', border:'' };
      if(g==='kbrky')  return { bg:'#7B5230', fg:'#FAE8C8', border:'' };
      return { bg:'#D4EAB0', fg:'#1E3A08', border:'' };
    },
  },
  {
    alleles: ['Em','E'],
    sortOrder: a => a==='Em' ? 0 : 1,
    pheno(g) {
      if(g==='EmEm') return { bg:'#1C1917', fg:'#D6CFC6', border:'' };
      if(g==='EmE')  return { bg:'#3B3330', fg:'#D6CFC6', border:'' };
      return { bg:'#F7F3ED', fg:'#57534E', border:'1px solid #D6CFC6' };
    },
  },
  {
    alleles: ['si','sw'],
    sortOrder: a => a==='si' ? 0 : 1,
    pheno(g) {
      if(g==='sisi') return { bg:'#8B3A2A', fg:'#FAEEDA', border:'' };
      if(g==='sisw') return { bg:'#D4763A', fg:'#FFF4E8', border:'' };
      return { bg:'#FAFAF8', fg:'#57534E', border:'1px solid #D6CFC6' };
    },
  },
];

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
  renderAll();
}

function sortAlleles(pair, C) {
  return [...pair].sort((a,b) => C.sortOrder(a) - C.sortOrder(b));
}

function getGametes(v, C) {
  const [a, b] = C.alleles;
  if(v === a+a) return [a, a];
  if(v === b+b) return [b, b];
  return [a, b];
}

function combineGeno(a1, a2, C) {
  return sortAlleles([a1, a2], C).join('');
}

function renderTable(idx) {
  const T = TRANSLATIONS[currentLang];
  const L = T.loci[idx];
  const C = LOCI_COLORS[idx];
  const v1 = document.getElementById('p1_'+idx).value;
  const v2 = document.getElementById('p2_'+idx).value;
  const g1 = getGametes(v1, C);
  const g2 = getGametes(v2, C);

  const tbl = document.getElementById('tbl_'+idx);
  const freq = document.getElementById('freq_'+idx);
  const counts = {};

  let html = `<thead><tr>
    <th class="corner" style="width:30px"></th>
    <th style="font-style:italic">${g2[0]}</th>
    <th style="font-style:italic">${g2[1]}</th>
  </tr></thead><tbody>`;

  for(let i=0;i<2;i++){
    html += `<tr><th style="font-style:italic">${g1[i]}</th>`;
    for(let j=0;j<2;j++){
      const geno = combineGeno(g1[i], g2[j], C);
      const col = C.pheno(geno);
      const phenoLabel = L.phenoLabels[geno] || geno;
      const key = phenoLabel;
      if(!counts[key]) counts[key] = { count:0, col };
      counts[key].count++;
      html += `<td style="background:${col.bg};${col.border ? 'border:'+col.border+';' : ''}">
        <div class="cell-geno" style="color:${col.fg}">${geno}</div>
        <div class="cell-pheno" style="color:${col.fg}">${phenoLabel}</div>
      </td>`;
    }
    html += '</tr>';
  }
  html += '</tbody>';
  tbl.innerHTML = html;

  freq.innerHTML = Object.entries(counts).map(([label, {count, col}]) =>
    `<div class="freq-row">
      <span class="freq-dot" style="background:${col.bg};${col.border ? 'border:'+col.border+';border-radius:50%;' : ''}"></span>
      <span class="freq-pct">${count}/4</span>
      <span>${Math.round(count/4*100)}% — ${label}</span>
    </div>`
  ).join('');
}

function renderAll() {
  const T = TRANSLATIONS[currentLang];

  document.getElementById('hdr-eyebrow').textContent = T.eyebrow;
  document.getElementById('hdr-title').textContent = T.title;
  document.getElementById('hdr-desc').textContent = T.desc;
  document.getElementById('footer-rules-label').textContent = T.rulesLabel;
  document.getElementById('footer-ref').innerHTML = T.footerRef;

  const rulesGrid = document.getElementById('rules-grid');
  rulesGrid.innerHTML = T.rules.map(r =>
    `<div class="rule-card" data-icon="${r.icon}">${r.text}</div>`
  ).join('');

  const app = document.getElementById('app');
  app.innerHTML = `<div class="section-label">${T.sectionLabel}</div>`;

  T.loci.forEach((L, idx) => {
    const C = LOCI_COLORS[idx];
    const [a, b] = C.alleles;

    const card = document.createElement('div');
    card.className = 'locus-card';

    const legendHtml = L.legend.map((l, li) =>
      `<span class="allele-chip"><strong>${li === 0 ? T.dom : T.rec}</strong><em>${l.allele}</em> — ${l.desc}</span>`
    ).join('');

    const optHtml = L.genotypes.map(g => `<option value="${g.v}">${g.label}</option>`).join('');

    card.innerHTML = `
      <div class="locus-header">
        <span class="locus-tag">${L.tag}</span>
        <span class="locus-title">${L.title}</span>
        <span class="locus-subtitle">${L.subtitle}</span>
      </div>
      <div class="locus-body">
        <div class="parents-col">
          <div class="allele-legend">${legendHtml}</div>
          <div class="parent-row">
            <label>${T.parent1}</label>
            <select id="p1_${idx}">${optHtml}</select>
          </div>
          <div class="parent-row">
            <label>${T.parent2}</label>
            <select id="p2_${idx}">${optHtml}</select>
          </div>
          <div class="freqs" id="freq_${idx}"></div>
        </div>
        <div class="punnett-wrap">
          <table class="punnett" id="tbl_${idx}"></table>
        </div>
        <div class="note-box" style="grid-column:1/-1">${L.note}</div>
      </div>
    `;

    app.appendChild(card);

    setTimeout(() => {
      const sel1 = document.getElementById('p1_'+idx);
      const sel2 = document.getElementById('p2_'+idx);
      sel1.value = a+b;
      sel2.value = a+b;
      renderTable(idx);
      sel1.addEventListener('change', () => renderTable(idx));
      sel2.addEventListener('change', () => renderTable(idx));
    }, 0);
  });
}

renderAll();
</script>
</body>
