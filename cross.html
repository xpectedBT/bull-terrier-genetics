<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Cross Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background:#F7F3ED;
  color:#1C1917;
  padding:20px;
  max-width:900px;
  margin:auto;
}

h1 { margin-bottom:10px; }

.section {
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:20px;
  border:1px solid #ddd;
}

.row {
  display:flex;
  gap:10px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

select {
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
  min-width:220px;
}

.label {
  font-size:12px;
  color:#777;
  margin-bottom:4px;
}

.result {
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:10px;
  border:1px solid #ddd;
}

.swatch {
  width:28px;
  height:18px;
  border-radius:5px;
  border:1px solid #aaa;
}

.nav {
  margin-bottom:15px;
}

.lang-switch {
  margin-bottom:15px;
}

button {
  padding:6px 10px;
  border-radius:6px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
}

button.active {
  background:#8B3A2A;
  color:white;
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">← Back</a>
</div>

<div class="lang-switch">
  <button id="btn-en" onclick="setLang('en')" class="active">EN</button>
  <button id="btn-fr" onclick="setLang('fr')">FR</button>
</div>

<h1 id="title">Simulate your litter</h1>

<div class="section">
  <h3 id="parent1Label">Parent 1</h3>
  <div class="row" id="p1"></div>

  <h3 id="parent2Label">Parent 2</h3>
  <div class="row" id="p2"></div>
</div>

<div class="section">
  <h3 id="resultsLabel">Results</h3>
  <div id="results"></div>
</div>

<script>

// ✅ LANGUAGE
let currentLang = "en";

const UI = {
  en: {
    title: "Simulate your litter",
    parent1: "Parent 1",
    parent2: "Parent 2",
    results: "Results"
  },
  fr: {
    title: "Simuler votre portée",
    parent1: "Parent 1",
    parent2: "Parent 2",
    results: "Résultats"
  }
};

// ✅ LABELS
const LABELS = {
  en: {
    AyAy: "AyAy / Red parent",
    Ayat: "Ayat / Red parent carrier Tri",
    atat: "atat / Tricolor parent",

    kbrkbr: "kbrkbr / Brindle parent",
    kbrky:  "kbrky / Brindle parent carrier non-brindle",
    kyky:   "kyky / Non-brindle parent",

    sisi: "sisi / Solid parent",
    sisw: "sisw / Colored & White parent",
    swsw: "swsw / White parent"
  },
  fr: {
    AyAy: "AyAy / Parent fauve",
    Ayat: "Ayat / Parent fauve porteur Tri",
    atat: "atat / Parent tricolore",

    kbrkbr: "kbrkbr / Parent bringé",
    kbrky:  "kbrky / Parent bringé porteur non-bringé",
    kyky:   "kyky / Parent non-bringé",

    sisi: "sisi / Parent solide",
    sisw: "sisw / Parent coloré & blanc",
    swsw: "swsw / Parent blanc"
  }
};

// ✅ LOCI (E removed)
const loci = [
  ["AyAy","Ayat","atat"],
  ["kbrkbr","kbrky","kyky"],
  ["sisi","sisw","swsw"]
];

// ✅ BUILD SELECTORS
function buildSelectors(containerId) {
  const container = document.getElementById(containerId);

  loci.forEach((locus) => {

    const wrap = document.createElement("div");

    const sel = document.createElement("select");

    locus.forEach(g => {
      const opt = document.createElement("option");
      opt.value = g;
      opt.textContent = LABELS[currentLang][g];
      sel.appendChild(opt);
    });

    sel.addEventListener("change", compute);

    wrap.appendChild(sel);
    container.appendChild(wrap);
  });
}

// ✅ CLEAN BUILD
function rebuild() {
  document.getElementById("p1").innerHTML = "";
  document.getElementById("p2").innerHTML = "";

  buildSelectors("p1");
  buildSelectors("p2");
}

// ✅ GENETICS HELPERS
function explode(geno) {
  return [geno.slice(0,2), geno.slice(2)];
}

function combine(g1, g2) {
  return [g1, g2].sort().join('');
}

// ✅ PHENOTYPE
function phenotype(g) {

  let color = "";
  let swatch = "#ccc";

  // A-series
  if(g[0].includes("Ay")) {
    color = currentLang === "fr" ? "Fauve" : "Red";
    swatch = "#C49A6C";
  } else {
