<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Cross Simulator</title>
 <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <!-- Shared styles -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<a href="index.html">← Back</a>

<br><br>

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>

<h1 id="title">Simulate your litter</h1>

<div class="section">
  <h3 id="p1Label">Parent 1</h3>
  <div class="row" id="p1"></div>

  <h3 id="p2Label">Parent 2</h3>
  <div class="row" id="p2"></div>
</div>

<div class="section">
  <h3 id="resultsLabel">Results</h3>
  <div id="results"></div>
</div>

<script>

// ✅ DEBUG (you should see this in console)
console.log("✅ JS LOADED");

// LANGUAGE
let currentLang = "en";

const LABELS = {
  en: {
    AyAy: "AyAy / Red parent",
    Ayat: "Ayat / Red parent carrier Tri",
    atat: "atat / Tricolor parent",

    kbrkbr: "kbrkbr / Brindle parent",
    kbrky:  "kbrky / Brindle parent carrier",
    kyky:   "kyky / Non-brindle parent",

    sisi: "sisi / Solid parent",
    sisw: "sisw / Colored & white",
    swsw: "swsw / White parent"
  },
  fr: {
    AyAy: "AyAy / Parent fauve",
    Ayat: "Ayat / Parent fauve porteur Tri",
    atat: "atat / Parent tricolore",

    kbrkbr: "kbrkbr / Parent bringé",
    kbrky:  "kbrky / Parent bringé porteur",
    kyky:   "kyky / Parent non-bringé",

    sisi: "sisi / Parent solide",
    sisw: "sisw / Parent coloré & blanc",
    swsw: "swsw / Parent blanc"
  }
};

// LOCI (3 only)
const loci = [
  ["AyAy","Ayat","atat"],
  ["kbrkbr","kbrky","kyky"],
  ["sisi","sisw","swsw"]
];

// BUILD SELECTORS
function buildSelectors(containerId) {
  const container = document.getElementById(containerId);

  loci.forEach(locus => {
    const select = document.createElement("select");

    locus.forEach(g => {
      const opt = document.createElement("option");
      opt.value = g;
      opt.textContent = LABELS[currentLang][g];
      select.appendChild(opt);
    });

    select.addEventListener("change", compute);
    container.appendChild(select);
  });
}

// REBUILD
function rebuild() {
  document.getElementById("p1").innerHTML = "";
  document.getElementById("p2").innerHTML = "";

  buildSelectors("p1");
  buildSelectors("p2");
}

// HELPERS
function explode(g) {
  return [g.slice(0,2), g.slice(2)];
}

function combine(a,b){
  return [a,b].sort().join('');
}

// PHENOTYPE
function phenotype(g) {

  let color = "Red";
  let swatch = "#C49A6C";

  if(!g[0].includes("Ay")) {
    color = "Tricolor";
    swatch = "#2C2C2C";
  }

  if(g[1].includes("kbr")) {
    color = "Brindle";
    swatch = "#7B5230";
  }

  if(g[2] === "swsw") {
    color = "White";
    swatch = "#FAFAF8";
  }
  else if(g[2] === "sisw") {
    color += " & white";
    swatch = "#D4763A";
  }

  return {label: color, swatch};
}

// COMPUTE
function compute() {

  const p1 = [...document.querySelectorAll("#p1 select")].map(s=>s.value);
  const p2 = [...document.querySelectorAll("#p2 select")].map(s=>s.value);

  let results = {};

  for(let i=0;i<16;i++){

    let child = [];

    for(let j=0;j<3;j++){
      const g1 = explode(p1[j]);
      const g2 = explode(p2[j]);

      const a = g1[Math.floor(Math.random()*2)];
      const b = g2[Math.floor(Math.random()*2)];

      child.push(combine(a,b));
    }

    const ph = phenotype(child);

    if(!results[ph.label]) results[ph.label]={count:0, sw:ph.swatch};
    results[ph.label].count++;
  }

  const res = document.getElementById("results");
  res.innerHTML = "";

  Object.entries(results).forEach(([label,data])=>{
    res.innerHTML += `
      <div class="result">
        <div class="swatch" style="background:${data.sw}"></div>
        <strong>${Math.round(data.count/16*100)}%</strong> — ${label}
      </div>
    `;
  });
}

// LANG SWITCH
function setLang(lang){
  currentLang = lang;
  rebuild();
  compute();
}

// INIT
rebuild();
compute();

</script>

</body>
</html>
