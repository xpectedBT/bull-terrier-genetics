<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Cross Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background:#F7F3ED;
  color:#1C1917;
  padding:20px;
  max-width:900px;
  margin:auto;
}

h1 { margin-bottom:10px; }

.section {
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:20px;
  border:1px solid #ddd;
}

.row {
  display:flex;
  gap:10px;
  margin-bottom:10px;
  flex-wrap:wrap;
}

select {
  padding:5px;
}

.result {
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:10px;
  border:1px solid #ddd;
}

.swatch {
  width:28px;
  height:18px;
  border-radius:5px;
  border:1px solid #aaa;
}

.nav {
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">← Back to loci view</a>
</div>

<h1>Simulate your litter</h1>

<div class="section">

<h3>Parent 1</h3>
<div class="row" id="p1"></div>

<h3>Parent 2</h3>
<div class="row" id="p2"></div>

</div>

<div class="section">
<h3>Results</h3>
<div id="results"></div>
</div>

<script>

// genotype options (same as your main app)
const loci = [
  ["AyAy","Ayat","atat"],
  ["kbrkbr","kbrky","kyky"],
  ["EmEm","EmE","EE"],
  ["sisi","sisw","swsw"]
];

function buildSelectors(containerId) {
  const container = document.getElementById(containerId);
  loci.forEach((locus, i) => {
    const sel = document.createElement("select");
    locus.forEach(g => {
      const opt = document.createElement("option");
      opt.value = g;
      opt.textContent = g;
      sel.appendChild(opt);
    });
    sel.addEventListener("change", compute);
    container.appendChild(sel);
  });
}

buildSelectors("p1");
buildSelectors("p2");

function explode(geno) {
  return geno.length === 4 ? [geno.slice(0,2), geno.slice(2)] : [geno];
}

function combine(g1, g2) {
  return [g1[0], g2[0]].sort().join('');
}

// phenotype simplification
function phenotype(g) {

  let color = "";
  let swatch = "#ccc";

  // base (A)
  if(g[0].includes("Ay")) { color = "Red"; swatch = "#C49A6C"; }
  else { color = "Black & tan"; swatch = "#2C2C2C"; }

  // brindle
  if(g[1].includes("kbr")) {
    color = "Brindle";
    swatch = "#7B5230";
  }

  // white spotting
  if(g[3] === "swsw") {
    color = "White";
    swatch = "#FAFAF8";
  }
  else if(g[3] === "sisw") {
    color += " & white";
    swatch = "#D4763A";
  }

  return {label: color, swatch};
}

function compute() {

  const p1 = [...document.querySelectorAll("#p1 select")].map(s=>s.value);
  const p2 = [...document.querySelectorAll("#p2 select")].map(s=>s.value);

  let results = {};

  for(let i=0;i<16;i++){

    let child = [];

    for(let j=0;j<4;j++){
      const g1 = explode(p1[j]);
      const g2 = explode(p2[j]);
      child.push(combine(g1[Math.floor(Math.random()*g1.length)], g2[Math.floor(Math.random()*g2.length)]));
    }

    const ph = phenotype(child);
    if(!results[ph.label]) results[ph.label]={count:0, sw:ph.swatch};
    results[ph.label].count++;
  }

  const resDiv = document.getElementById("results");
  resDiv.innerHTML = "";

  Object.entries(results).forEach(([label,data])=>{
    const div = document.createElement("div");
    div.className="result";
    div.innerHTML = `
      <div class="swatch" style="background:${data.sw}"></div>
      <strong>${Math.round(data.count/16*100)}%</strong> — ${label}
    `;
    resDiv.appendChild(div);
  });

}

compute();

</script>

</body>
</html>
``
