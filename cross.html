<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bull Terrier — Simulate a Litter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-inner">
    <nav class="nav-links">
      <a class="nav-link" href="index.html" id="nav-genetics"></a>
      <a class="nav-link active" href="cross.html" id="nav-litter"></a>
      <a class="nav-link" href="reverse.html" id="nav-reverse"></a>
    </nav>
    <div class="lang-group">
      <span class="lang-label">Lang</span>
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
    </div>
  </div>
</div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-inner">
    <div class="header-eyebrow" id="hdr-eyebrow"></div>
    <h1 id="hdr-title"></h1>
    <p id="hdr-desc"></p>
  </div>
</div>

<main>
  <!-- PARENTS CARD -->
  <div class="card">
    <div class="card-header">
      <span class="card-tag" id="card-tag-parents"></span>
      <span class="card-title" id="card-title-parents"></span>
    </div>
    <div class="card-body">
      <div class="parents-grid">

        <!-- Parent 1 -->
        <div class="parent-block">
          <div class="parent-label" id="p1-label"></div>
          <div class="locus-row">
            <div class="locus-row-label" id="p1-a-label"></div>
            <select id="p1-A" onchange="update()"></select>
          </div>
          <div class="locus-row">
            <div class="locus-row-label" id="p1-k-label"></div>
            <select id="p1-K" onchange="update()"></select>
          </div>
          <div class="locus-row">
            <div class="locus-row-label" id="p1-s-label"></div>
            <select id="p1-S" onchange="update()"></select>
          </div>
          <div class="dog-preview" id="p1-preview">
            <img id="p1-img" src="" alt="Parent 1" onerror="this.style.outline='2px solid red';console.error('Image not found:',this.src)"/>
            <div class="phenotype-badge" id="p1-pheno-label"></div>
            <div class="genotype-pills" id="p1-geno-pills"></div>
          </div>
        </div>

        <!-- Parent 2 -->
        <div class="parent-block">
          <div class="parent-label" id="p2-label"></div>
          <div class="locus-row">
            <div class="locus-row-label" id="p2-a-label"></div>
            <select id="p2-A" onchange="update()"></select>
          </div>
          <div class="locus-row">
            <div class="locus-row-label" id="p2-k-label"></div>
            <select id="p2-K" onchange="update()"></select>
          </div>
          <div class="locus-row">
            <div class="locus-row-label" id="p2-s-label"></div>
            <select id="p2-S" onchange="update()"></select>
          </div>
          <div class="dog-preview" id="p2-preview">
            <img id="p2-img" src="" alt="Parent 2" onerror="this.style.outline='2px solid red';console.error('Image not found:',this.src)"/>
            <div class="phenotype-badge" id="p2-pheno-label"></div>
            <div class="genotype-pills" id="p2-geno-pills"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- RESULTS CARD -->
  <div class="card">
    <div class="card-header">
      <span class="card-tag" id="card-tag-results"></span>
      <span class="card-title" id="card-title-results"></span>
    </div>
    <div class="card-body">
      <div class="method-row">
        <span class="method-label" id="method-label"></span>
        <button class="method-btn active" id="btn-exact" onclick="setMethod('exact')"></button>
        <button class="method-btn" id="btn-sim" onclick="setMethod('sim')"></button>
      </div>
      <div class="section-label" id="results-section-label"></div>
      <div class="results-grid" id="results-grid"></div>
      <div class="note-box" id="results-note"></div>
    </div>
  </div>
</main>

<footer id="footer-ref"></footer>

<script src="js/ui.js"></script>
<script src="js/cross.js"></script>

</body>
</html>
