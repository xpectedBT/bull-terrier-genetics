<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bull Terrier — Identify your dog's Genotype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
/* ── page-specific additions ── */
.pheno-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 1rem;
  margin-top: .5rem;
}
.pheno-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  background: var(--cream);
  border: 2px solid var(--rule);
  border-radius: var(--radius-md);
  padding: .85rem .6rem;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  text-align: center;
}
.pheno-card:hover { border-color: var(--accent); background: var(--accent-light); }
.pheno-card.selected { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(139,58,42,.15); }
.pheno-card img { width: 100px; height: 72px; object-fit: contain; filter: drop-shadow(0 1px 3px rgba(0,0,0,.12)); pointer-events: none; }
.pheno-card-label { font-size: 11px; font-weight: 600; color: var(--ink-soft); line-height: 1.4; }
.pheno-card.selected .pheno-card-label { color: var(--accent); }

/* ── results ── */
.geno-results { display: grid; gap: 1rem; margin-top: .5rem; }
.geno-option {
  background: var(--cream);
  border: 1px solid var(--rule);
  border-radius: var(--radius-md);
  padding: 1rem 1.1rem;
}
.geno-option-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.geno-number {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--white);
  background: var(--accent);
  padding: 2px 8px;
  border-radius: 20px;
  flex-shrink: 0;
}
.geno-formula {
  font-size: 14px;
  font-style: italic;
  font-weight: 600;
  color: var(--ink);
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.locus-pill {
  font-size: 12px;
  font-style: italic;
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 2px 10px;
  color: var(--ink);
  font-weight: 600;
}
.locus-pill span {
  font-weight: 400;
  font-style: normal;
  color: var(--ink-muted);
  font-size: 10px;
  margin-left: 4px;
}
.offspring-note {
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.6;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--rule);
}

.empty-state {
  text-align: center;
  padding: 2.5rem 1rem;
  color: var(--ink-muted);
  font-size: 14px;
}
.empty-state .icon { font-size: 2.5rem; margin-bottom: .5rem; }

.hint-box {
  background: var(--accent-light);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 10px 12px;
  font-size: 12px;
  color: #5C2018;
  line-height: 1.6;
  margin-top: 1rem;
}

.selected-banner {
  display: none;
  align-items: center;
  gap: 10px;
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: var(--radius-md);
  padding: .75rem 1rem;
  margin-bottom: 1rem;
}
.selected-banner.visible { display: flex; }
.selected-banner img { width: 64px; height: 46px; object-fit: contain; }
.selected-banner-text { font-size: 13px; font-weight: 600; color: var(--ink); }
.selected-banner-sub  { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-inner">
    <nav class="nav-links">

      <a class="nav-link" href="cross.html" id="nav-litter"></a>
      <a class="nav-link active" href="reverse.html" id="nav-reverse"></a>
    </nav>
    <div class="lang-group">
      <span class="lang-label">Lang</span>
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>

  </div>

    <p id="hdr-desc"></p>

    </div>

      <div class="pheno-grid" id="grid-white"></div>
    </div>
  </div>

  <!-- STEP 2 — results -->

    <div class="card-header">
      <span class="card-tag" id="card-tag-step2"></span>

    </div>
    <div class="card-body">
      <div class="selected-banner" id="selected-banner">

        </div>
      </div>
      <div class="hint-box" id="hint-box" style="display:none"></div>
    </div>
  </div>
</main>

<footer id="footer-ref"></footer>

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let lang = localStorage.getItem('btLang') || 'en';
let selectedKey = null;

function setLang(l){
  lang = l;
  localStorage.setItem('btLang', l);
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.getElementById('btn-fr').classList.toggle('active', l==='fr');
  document.documentElement.lang = l;
  renderAll();
}

/* ══════════════════════════════════════════
   SELECT PHENOTYPE
══════════════════════════════════════════ */
function selectPheno(key){
  selectedKey = key;
  document.querySelectorAll('.pheno-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.key === key);
  });
  renderResults();
}

/* ══════════════════════════════════════════
   RENDER PHENOTYPE GRID
══════════════════════════════════════════ */
function renderGrid(groupId, group){
  const container = document.getElementById(groupId);
  const items = PHENOTYPES.filter(p => p.group === group);
  container.innerHTML = items.map(p => `
    <div class="pheno-card${selectedKey===p.key?' selected':''}" data-key="${p.key}" onclick="selectPheno('${p.key}')">
      <img src="${p.img}" alt="${p.label[lang]}" onerror="this.style.opacity='.3'"/>
      <div class="pheno-card-label">${p.label[lang]}</div>
    </div>
  `).join('');
}

/* ══════════════════════════════════════════
   RENDER RESULTS
══════════════════════════════════════════ */
function renderResults(){
  const ui = UI[lang];
  const resultsEl = document.getElementById('geno-results');
  const hintEl    = document.getElementById('hint-box');
  const banner    = document.getElementById('selected-banner');

  if(!selectedKey){
    banner.classList.remove('visible');
    resultsEl.innerHTML = `<div class="empty-state"><div class="icon">🐾</div><div>${ui.emptyText}</div></div>`;
    hintEl.style.display = 'none';
    return;
  }

  const pheno = PHENOTYPES.find(p => p.key === selectedKey);
  if(!pheno) return;

  // Banner
  banner.classList.add('visible');
  document.getElementById('banner-img').src = pheno.img;
  document.getElementById('banner-label').textContent = pheno.label[lang];
  document.getElementById('banner-sub').textContent =
    `${pheno.genotypes.length} ${pheno.genotypes.length > 1
      ? (lang==='en' ? 'possible genotypes' : 'génotypes possibles')
      : (lang==='en' ? 'possible genotype' : 'génotype possible')}`;

  // Genotype options
  resultsEl.innerHTML = pheno.genotypes.map((g, i) => `
    <div class="geno-option">
      <div class="geno-option-header">
        <span class="geno-number">${ui.optionLabel(i+1)}</span>
        <div class="geno-formula">
          ${g.pills.map(([allele, locus]) =>
            `<span class="locus-pill">${allele}<span>${locus}</span></span>`
          ).join('<span style="color:var(--ink-muted);font-style:normal">×</span>')}
        </div>
      </div>
      <div class="offspring-note">
        <strong>${ui.offspringTitle}</strong> ${g.note[lang]}
      </div>
    </div>
  `).join('');

  // Hint only when multiple options exist
  if(pheno.genotypes.length > 1){
    hintEl.textContent = ui.hint;
    hintEl.style.display = 'block';
  } else {
    hintEl.style.display = 'none';
  }
}

/* ══════════════════════════════════════════
   RENDER ALL UI
══════════════════════════════════════════ */
function renderAll(){
  const ui = UI[lang];
  document.getElementById('nav-genetics').textContent  = ui.navGenetics;
  document.getElementById('nav-litter').textContent    = ui.navLitter;
  document.getElementById('nav-reverse').textContent   = ui.navReverse;
  document.getElementById('hdr-eyebrow').textContent   = ui.eyebrow;
  document.getElementById('hdr-title').textContent     = ui.title;
  document.getElementById('hdr-desc').textContent      = ui.desc;
  document.getElementById('card-tag-step1').textContent  = ui.tagStep1;
  document.getElementById('card-title-step1').textContent = ui.titleStep1;
  document.getElementById('card-tag-step2').textContent  = ui.tagStep2;
  document.getElementById('card-title-step2').textContent = ui.titleResults;
  document.getElementById('label-coloured').textContent  = ui.labelColoured;
  document.getElementById('label-white').textContent     = ui.labelWhite;
  document.getElementById('empty-text').textContent      = ui.emptyText;
  document.getElementById('footer-ref').textContent      = ui.footer;
  renderGrid('grid-coloured', 'coloured');
  renderGrid('grid-white',    'white');
  renderResults();
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
document.getElementById('btn-en').classList.toggle('active', lang==='en');
document.getElementById('btn-fr').classList.toggle('active', lang==='fr');
document.documentElement.lang = lang;
renderAll();
</script>
