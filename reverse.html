<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bull Terrier — Identify your dog's Genotype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-inner">

    <!-- ✅ BRAND -->
    <a href="index.html" class="brand">
      🐾 BullTools
    </a>


    <nav class="nav-links">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="genetics.html" id="nav-genetics"></a>
      <a class="nav-link" href="cross.html" id="nav-litter"></a>
      <a class="nav-link active" href="reverse.html" id="nav-reverse"></a>
    </nav>

    <div class="lang-group">
      <span class="lang-label">Lang</span>
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
    </div>

  </div>
</div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-inner">
    <div class="header-eyebrow" id="hdr-eyebrow"></div>
    <h1 id="hdr-title"></h1>
    <p id="hdr-desc"></p>
  </div>
</div>

<main>
  <!-- STEP 1 — pick phenotype -->
  <div class="card">
    <div class="card-header">
      <span class="card-tag" id="card-tag-step1"></span>
      <span class="card-title" id="card-title-step1"></span>
    </div>
    <div class="card-body">
      <div class="section-label" id="label-coloured"></div>
      <div class="pheno-grid" id="grid-coloured"></div>
      <div class="section-label" id="label-white" style="margin-top:1.25rem"></div>
      <div class="pheno-grid" id="grid-white"></div>
    </div>
  </div>

  <!-- STEP 2 — results -->
  <div class="card">
    <div class="card-header">
      <span class="card-tag" id="card-tag-step2"></span>
      <span class="card-title" id="card-title-step2"></span>
    </div>
    <div class="card-body">
      <div class="selected-banner" id="selected-banner">
        <img id="banner-img" src="" alt=""/>
        <div>
          <div class="selected-banner-text" id="banner-label"></div>
          <div class="selected-banner-sub" id="banner-sub"></div>
        </div>
      </div>
      <div class="geno-results" id="geno-results">
        <div class="empty-state">
          <div class="icon">🐾</div>
          <div id="empty-text"></div>
        </div>
      </div>
      <div class="hint-box" id="hint-box" style="display:none"></div>
    </div>
  </div>
</main>

<footer id="footer-ref"></footer>

<script src="js/ui.js"></script>
<script src="js/reverse.js"></script>

</body>
</html>
